<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OnMap â€” Operator Dashboard</title>
<link rel="stylesheet" href="style.css">
<style>
  body{background:var(--soft)}
  .dash{max-width:980px;margin:0 auto;padding:32px 22px 70px}
  .dhead{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;margin-bottom:28px}
  .dhead h1{font-size:1.7rem}
  .dhead p{color:var(--muted)}
  .funnel{display:grid;gap:12px;margin-bottom:32px}
  .stage{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 22px;display:flex;justify-content:space-between;align-items:center;gap:16px}
  .stage .l b{font-size:1.02rem}
  .stage .l small{display:block;color:var(--muted)}
  .stage .r{text-align:right;min-width:150px}
  .stage .n{font-size:1.9rem;font-weight:800;color:var(--ink)}
  .bar{height:7px;background:linear-gradient(90deg,var(--accent),var(--accent-2));border-radius:4px;margin-top:6px}
  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  @media(max-width:820px){.cards{grid-template-columns:1fr 1fr}}
  .mini{background:#fff;border:1px solid var(--line);border-radius:13px;padding:18px 20px}
  .mini .n{font-size:1.7rem;font-weight:800}
  .mini .l{color:var(--muted);font-size:.85rem}
  .err{background:#fef2f2;color:#b91c1c;padding:12px 16px;border-radius:10px;margin-bottom:18px;font-size:.9rem}
  h2.sec{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin:26px 0 12px}
</style>
</head>
<body>
<div class="dash">
  <div class="dhead">
    <div><div class="brand" style="margin-bottom:6px"><span class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 12-9 12s-9-5-9-12a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></span>OnMap</div>
    <h1>Operator Dashboard</h1><p>Your whole funnel on one screen.</p></div>
    <button class="btn btn-primary" onclick="load()">Refresh</button>
  </div>

  <div id="err"></div>

  <h2 class="sec">Acquisition funnel</h2>
  <div class="funnel" id="funnel"></div>

  <h2 class="sec">Activity</h2>
  <div class="cards" id="cards"></div>
</div>

<script>
async function load(){
  let d; try{ d=await (await fetch('/api/pipeline')).json(); }catch(e){
    document.getElementById('err').innerHTML='<div class="err">Could not load pipeline data.</div>'; return; }
  const f=d.funnel||{};
  document.getElementById('err').innerHTML = f.available===false
    ? '<div class="err">No prospects found yet. Run <b>python finder.py --area "Geelong"</b> to fill the pipeline.</div>' : '';
  const total=Math.max(f.total||0,1);
  const stages=[
    {n:f.total||0, l:'Businesses found', s:(f.suburbs||0)+' area(s) Â· via OpenStreetMap', w:100},
    {n:(f.no_website||0)+(f.bad_seo||0), l:'Need a website or SEO help', s:f.no_website+' no site Â· '+f.bad_seo+' weak site', w:((f.no_website||0)+(f.bad_seo||0))/total*100},
    {n:f.emailable||0, l:'Emailable (primary channel)', s:'have a contactable email', w:(f.emailable||0)/total*100},
    {n:d.demos_built||0, l:'Demo sites pre-built', s:'ready to show', w:Math.min(100,(d.demos_built||0)/total*100)},
    {n:d.outreach_drafted||0, l:'Outreach emails drafted', s:'in the outbox / CSV', w:Math.min(100,(d.outreach_drafted||0)/total*100)}
  ];
  document.getElementById('funnel').innerHTML=stages.map(s=>`
    <div class="stage"><div class="l"><b>${s.l}</b><small>${s.s}</small></div>
    <div class="r"><div class="n">${s.n}</div><div class="bar" style="width:${Math.max(5,s.w)}%"></div></div></div>`).join('');
  const cards=[
    {n:f.hot||0,l:'Hot prospects (need â‰¥50)'},{n:f.no_website||0,l:'No website at all'},
    {n:f.bad_seo||0,l:'Weak / bad website'},{n:f.emailable||0,l:'Have email'},
    {n:f.phone_only||0,l:'Phone only'},{n:d.scan_leads||0,l:'Inbound scan leads'},
    {n:d.site_leads||0,l:'Leads from live sites'},{n:d.suppressed||0,l:'Unsubscribed'}
  ];
  document.getElementById('cards').innerHTML=cards.map(c=>`<div class="mini"><div class="n">${c.n}</div><div class="l">${c.l}</div></div>`).join('');
}
load();
</script>
<script data-goatcounter="https://smuffinz.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
